version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13
    container_name: xfl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: newpassword
      POSTGRES_DB: xfl_metrics
      # Enable synchronous commits to prevent data loss on crash
      # This ensures data is written to disk immediately
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c synchronous_commit=on
      -c fsync=on
      -c full_page_writes=on
      -c wal_level=replica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
    # Add restart policy to keep postgres running
    restart: unless-stopped

  # FL Server
  server:
    image: xfl-rpilab-client:latest
    container_name: xfl-server
    command: python -m server.run_server_standalone
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./server:/app/server
      - ./client:/app/client
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - NUM_CLIENTS=40
      - DATABASE_URL=postgresql://postgres:newpassword@postgres:5432/xfl_metrics
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M

  # Dashboard
  dashboard:
    image: xfl-rpilab-client:latest
    container_name: xfl-dashboard
    command: python -m dashboard.run_dashboard_standalone
    ports:
      - "5001:5001"
    volumes:
      - ./logs:/app/logs
      - ./dashboard:/app/dashboard
    environment:
      - PYTHONUNBUFFERED=1
      - NUM_CLIENTS=40
      - DATABASE_URL=postgresql://postgres:newpassword@postgres:5432/xfl_metrics
    depends_on:
      - server
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Client 0
  client-0:
    image: xfl-rpilab-client:latest
    container_name: xfl-client-0
    command: python -m client.run_client_standalone --client-id 0 --server-host server --num-clients 40 --batch-size 32
    volumes:
      - ./data:/app/data:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - server
    networks:
      - fl-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M

  # Client 1
