# ============================================================================
# XFL-RPiLab Configuration File - FIXED FOR Pydantic v2 VALIDATION
# ============================================================================
# Projet: Un framework logiciel de benchmarking pour le Layer-Wise FedML
# Auteur: SAGHOUGH Salma
# Encadrant: Pr Yann BEN MAISSA
# ============================================================================

experiment:
  name: "cifar100_fedavg_xfl_baseline"
  description: "CIFAR100 baseline experiment with FedAvg-XFL (10 Raspberry Pi)"
  seed: 42

federated_learning:
  num_rounds: 100
  num_clients: 10
  clients_per_round: 7
  local_epochs: 1

dataset:
  name: "CIFAR100"
  data_distribution: "iid"
  train_test_split: 0.8
  batch_size: 128

model:
  name: "CIFAR100CNN"
  input_shape: [3, 32, 32]
  num_classes: 100

training:
  optimizer: "sgd"
  learning_rate: 0.0001
  momentum: 0.9
  weight_decay: 0.0005

strategy:
  type: "all_layers"
  num_layers: null

network:
  simulate_constraints: false
  latency_ms: 50
  latency_std_ms: 10
  bandwidth_mbps: 10
  packet_loss_rate: 0.0
  jitter_ms: 5

monitoring:
  enabled: true
  metrics_interval_sec: 5
  log_level: "INFO"
  collect_layer_importance: true
  collect_client_divergence: true
  collect_convergence_rate: true

server:
  host: "0.0.0.0"
  port: 5000
  aggregation_method: "fedavg"
  metrics_db_url: "postgresql://postgres:newpassword@localhost:5432/xfl_metrics"

client:
  timeout_sec: 300
  max_retries: 3
  auto_detect_resources: true
  cpu_affinity: null

paths:
  data_dir: "./data"
  models_dir: "./models"
  logs_dir: "./logs"
  results_dir: "./results"
