# ============================================================================
# XFL-RPiLab Configuration File
# ============================================================================
# Projet: Un framework logiciel de benchmarking pour le Layer-Wise FedML
# Auteur: SAGHOUGH Salma
# Encadrant: Pr Yann BEN MAISSA
# ============================================================================

experiment:
  name: "mnist_fedavg_xfl_baseline"
  description: "Baseline experiment with FedAvg-XFL on MNIST (10 Raspberry Pi)"
  seed: 42

federated_learning:
  num_rounds: 50
  num_clients: 10        # ← nombre réel de clients Docker (client-0 à client-9)
  clients_per_round: 7   # ← doit être ≤ num_clients
  local_epochs: 2

dataset:
  name: "MNIST"
  data_distribution: "iid"
  train_test_split: 0.8
  batch_size: 32

model:
  name: "SimpleCNN"
  input_shape: [1, 28, 28]
  num_classes: 10

training:
  optimizer: "sgd"
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 0.0001

strategy:
  type: "all_layers"
  num_layers: null

network:
  simulate_constraints: false
  latency_ms: 50
  latency_std_ms: 10
  bandwidth_mbps: 10
  packet_loss_rate: 0.0
  jitter_ms: 5

monitoring:
  enabled: true
  metrics_interval_sec: 5
  log_level: "INFO"
  collect_layer_importance: true
  collect_client_divergence: true
  collect_convergence_rate: true

server:
  host: "0.0.0.0"
  port: 5000
  aggregation_method: "fedavg"
  metrics_db_url: "postgresql://postgres:newpassword@localhost:5432/xfl_metrics"

client:
  timeout_sec: 300
  max_retries: 3
  auto_detect_resources: true
  cpu_affinity: nullzz

paths:
  data_dir: "./data"
  models_dir: "./models"
  logs_dir: "./logs"
  results_dir: "./results"